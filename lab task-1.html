<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>University Admission Form</title>
</head>
<body>

    <h2>Admission Form</h2>

    <form>

        <fieldset>
            <legend>Personal Info</legend>

            <label>Full Name:</label><br>
            <input type="text" name="fullname" maxlength="30" required>
            <br><br>

            <label>Email Address:</label><br>
            <input type="email" name="email" required>
            <br><br>

            <label>Date of Birth:</label><br>
            <input type="date" name="dob" required>
            <br><br>

            <label>Gender:</label><br>
            <input type="radio" name="gender" value="male" required> Male
            <input type="radio" name="gender" value="female"> Female
            <input type="radio" name="gender" value="other"> Other
            <br><br>

        </fieldset>

    
        <fieldset>
            <legend>Academic Info</legend>

            <label>College Name:</label><br>
            <input type="text" name="institution" maxlength="50" required>
            <br><br>

            <label>GPA:</label><br>
            <input type="text" name="gpa" required>
            <br><br>

            <label>Preferred Department:</label><br>
            <select name="department" required>
                <option value="">Select Department</option>
                <option>CSE</option>
                <option>EEE</option>
                <option>BBA</option>
                <option>IPE</option>
            </select>
            <br><br>

        </fieldset>

        <fieldset>
            <legend>Additional Info</legend>

            <label>Interests:</label><br>
            <input type="checkbox" name="interest" value="sports"> Sports
            <input type="checkbox" name="interest" value="music"> Music
            <input type="checkbox" name="interest" value="technology"> Technology
            <input type="checkbox" name="interest" value="reading"> Reading
            <br><br>

            <label>Upload Transcript:</label><br>
            <input type="file" name="transcript" required>
            <br><br>

        </fieldset>

        <br>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
